<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile Card UI Design</title>

     <link type="" rel="stylesheet" href="style.css"/>
     <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

      <link type="" href="https//unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="profile-card">
    <div class="image">
        <img src="https://images2.minutemediacdn.com/image/upload/c_crop,w_4500,h_2531,x_0,y_0/c_fill,w_1200,ar_1:1,f_auto,q_auto,g_auto/images/voltaxMediaLibrary/mmsport/real_madrid_cf_on_si/01jfcm66501zrdtf63hh.jpg" alt="" class="profile-img">
    </div>

    <div class="text-data">
     <span class="name">@Mikel</span>
     <span class="job">YouTuber & Blogger</span>
    </div>


    <div class="media-buttons">
        <a href="#" style=" background-color: lime;" class="link">
            <i class="fa-brands fa-whatsapp"></i>
        </a>
        <a href="#" style="background-color:black ;" class="link">
            <i class="fa-brands fa-tiktok"></i>
        </a>
        <a href="#" style="background-color: blue;" class="link">
            <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="#" style="background-color:red ;" class="link">
            <i class="fa-brands fa-youtube"></i>
        </a>
    </div>
    <div class="buttons">
        <button class="button">Subscribe</button>
        <button class="button">Message</button>
    </div>
    <div class="analytics">
        <div class="data">
            <i class="fa-regular fa-heart"></i>
            <span class="number">23.1M</span>
        <div class="data">
            <i class="fa-regular fa-comment"></i>
            <span class="number">3.2M</span>
        <div class="data">
            <i class="fa-solid fa-share-from-square"></i>
            <span class="number">16.2M</span>
        </div>
    </div>
    </div>
</body>
</html>
